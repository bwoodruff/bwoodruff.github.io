<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    /* Nord — https://www.nordtheme.com */
    :root {
      --nord0: #2e3440;
      --nord4: #d8dee9;
      --frost0: #8fbcbb;
      --frost1: #88c0d0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: monospace;
      font-size: 1em;
      line-height: 1.5;
      background: var(--nord0);
      color: var(--nord4);
    }

    .arms-panel {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .arms-landing {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .arms-figure {
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .arms-img {
      display: block;
      max-width: min(371px, 85vw);
      height: auto;
    }

    .arms-blazon {
      margin: 0;
      margin-top: 2em;
      max-width: 38em;
    }

    .arms-link {
      margin: 0;
      margin-top: 1.5em;
      text-align: center;
    }

    a {
      color: var(--frost1);
      text-decoration: none;
      border-bottom: 1px solid rgba(136, 192, 208, 0.45);
    }

    a:hover {
      color: var(--frost0);
      border-bottom-color: var(--frost0);
    }

    a:focus-visible {
      outline: 2px solid var(--frost1);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="arms-panel">
    <div class="arms-landing">
      <figure class="arms-figure">
        <img
          class="arms-img"
          src="images/bwoodruff-arms.png"
          width="371"
          height="600"
          title="Argent, on a bend cotticed purpure, three keys bendwise, wards to sinister and downwards of the field."
          alt="Argent, on a bend cotticed purpure, three keys bendwise, wards to sinister and downwards of the field."
        >
        <figcaption class="arms-blazon">Argent, on a bend cotticed purpure, three keys bendwise, wards to sinister and downwards of the field.</figcaption>
      </figure>
      <p class="arms-link">
        <a rel="me" href="https://github.com/bwoodruff">GitHub</a>
      </p>
    </div>
  </div>
</body>
</html>
